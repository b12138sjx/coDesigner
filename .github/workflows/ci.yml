name: CI

on:
  pull_request:
  push:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build ai-api
        working-directory: ai-api
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke build web image
        run: docker build -f Dockerfile.web .

      - name: Smoke build backend image
        run: docker build -f backend/Dockerfile backend

      - name: Smoke build ai-api image
        run: docker build -f ai-api/Dockerfile ai-api
